<svg width="680" height="590" viewBox="0 0 680 590" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Codeのネットワーク境界比較図">
  <title>Claude Code ネットワーク境界図</title>
  <desc>直接接続はAnthropicサーバーまでデータが届く。Bedrock経由は自社専用AWSアカウント内で完結し、Anthropicはアクセス不可。</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; font-size: 12px; fill: #1a1a1a; }
      .th { font-size: 13px; font-weight: 600; }
      .ts { font-size: 11px; }
    </style>
  </defs>

  <rect width="680" height="590" fill="white"/>

  <!-- Path labels -->
  <text class="ts" x="185" y="15" text-anchor="middle" fill="#A32D2D">A：直接接続</text>
  <text class="ts" x="510" y="15" text-anchor="middle" fill="#185FA5">B：Bedrock 経由</text>

  <!-- SHARED green zone -->
  <rect x="185" y="22" width="310" height="218" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text class="ts" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#3B6D11" font-weight="500">社内ネットワーク（共通）</text>

  <!-- PC -->
  <rect x="260" y="50" width="160" height="38" rx="8" fill="white" stroke="#639922" stroke-width="1.2"/>
  <text class="th" x="340" y="69" text-anchor="middle" dominant-baseline="central" fill="#27500A">開発者PC</text>
  <line x1="340" y1="88" x2="340" y2="118" stroke="#639922" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Claude Code -->
  <rect x="255" y="120" width="170" height="38" rx="8" fill="white" stroke="#639922" stroke-width="1.2"/>
  <text class="th" x="340" y="139" text-anchor="middle" dominant-baseline="central" fill="#27500A">Claude Code</text>
  <line x1="340" y1="158" x2="340" y2="188" stroke="#639922" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW -->
  <rect x="255" y="190" width="170" height="38" rx="8" fill="white" stroke="#639922" stroke-width="1.2"/>
  <text class="th" x="340" y="209" text-anchor="middle" dominant-baseline="central" fill="#27500A">社内ゲートウェイ</text>

  <!-- FORK -->
  <line x1="340" y1="228" x2="340" y2="244" stroke="#888" stroke-width="1.5"/>
  <line x1="185" y1="244" x2="510" y2="244" stroke="#888" stroke-width="1.5"/>
  <line x1="185" y1="244" x2="185" y2="264" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <line x1="510" y1="244" x2="510" y2="264" stroke="#378ADD" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>

  <!-- LEFT: RED zone -->
  <rect x="30" y="260" width="310" height="250" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text class="ts" x="50" y="278" dominant-baseline="central" fill="#A32D2D" font-weight="500">インターネット経由 → 外部（Anthropic）</text>

  <rect x="65" y="292" width="240" height="38" rx="8" fill="white" stroke="#E24B4A" stroke-width="1.2"/>
  <text class="th" x="185" y="311" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Anthropic API</text>
  <line x1="185" y1="330" x2="185" y2="362" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="65" y="364" width="240" height="38" rx="8" fill="white" stroke="#E24B4A" stroke-width="1.2"/>
  <text class="th" x="185" y="383" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Claudeモデル</text>

  <rect x="65" y="414" width="240" height="46" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text class="ts" x="185" y="430" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">⚠ Anthropicにデータが届く</text>
  <text class="ts" x="185" y="450" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">（学習利用・参照の可能性あり）</text>

  <!-- RIGHT: BLUE zone -->
  <rect x="360" y="260" width="290" height="278" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
  <rect x="360" y="260" width="290" height="28" rx="10" fill="#378ADD"/>
  <rect x="360" y="276" width="290" height="12" fill="#378ADD"/>
  <text class="ts" x="505" y="277" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">🔒 自社専用AWSアカウント（閉域）</text>

  <text class="ts" x="380" y="302" dominant-baseline="central" fill="#185FA5" font-weight="500">AWS Bedrock</text>
  <text class="ts" x="505" y="320" text-anchor="middle" dominant-baseline="central" fill="#378ADD">（VPC / PrivateLink 経由）</text>

  <rect x="395" y="330" width="220" height="38" rx="8" fill="white" stroke="#378ADD" stroke-width="1.2"/>
  <text class="th" x="505" y="349" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Bedrockエンドポイント</text>
  <line x1="505" y1="368" x2="505" y2="398" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="395" y="400" width="220" height="38" rx="8" fill="white" stroke="#378ADD" stroke-width="1.2"/>
  <text class="th" x="505" y="419" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Claudeモデル</text>

  <rect x="395" y="454" width="220" height="46" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
  <text class="ts" x="505" y="469" text-anchor="middle" dominant-baseline="central" fill="#27500A">🔒 Anthropicはアクセス不可</text>
  <text class="ts" x="505" y="489" text-anchor="middle" dominant-baseline="central" fill="#27500A">自社アカウント内で完結</text>

  <!-- Legend -->
  <rect x="108" y="556" width="12" height="10" rx="2" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text class="ts" x="124" y="561" dominant-baseline="central" fill="#555">社内（安全）</text>
  <rect x="224" y="556" width="12" height="10" rx="2" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text class="ts" x="240" y="561" dominant-baseline="central" fill="#555">外部インターネット（リスク）</text>
  <rect x="402" y="556" width="12" height="10" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="ts" x="418" y="561" dominant-baseline="central" fill="#555">自社専用AWSアカウント（閉域）</text>
</svg>
